# pytest.ini — CiviFix Appium Test Suite
[pytest]
testpaths = appium_tests/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
log_cli = true
log_cli_level = INFO
log_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_date_format = %H:%M:%S
addopts = --tb=short
