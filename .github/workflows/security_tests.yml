name: "🛡️ CiviFix Mobile Vulnerability Testing"

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sundays
  workflow_dispatch:

jobs:
  security-tests:
    name: "Run OWASP Mobile Top 10 Security Tests"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Set up Python"
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: "📦 Install Framework Dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r mobile_vulnerability_testing/requirements.txt
          echo "✅ Dependencies installed"

      - name: "🛡️ Execute Vulnerability Testing Framework"
        run: |
          cd mobile_vulnerability_testing
          python run_security_tests.py

      - name: "📊 Upload Reports & Evidence"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CiviFix_Security_Evidence
          path: |
            mobile_vulnerability_testing/reports/
            mobile_vulnerability_testing/evidence/
          retention-days: 30
