name: E2E Selenium Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest openpyxl
        
    - name: Run E2E Selenium Test Suite
      run: |
        pytest selenium_tests/test_mock_selenium.py -v
        
    - name: Generate Execution Report
      run: |
        python selenium_tests/generate_report.py
        
    - name: Upload Excel Report Artifact
      uses: actions/upload-artifact@v3
      with:
        name: CiviFix_Selenium_Execution_Report
        path: CiviFix_Selenium_Execution_Report.xlsx
