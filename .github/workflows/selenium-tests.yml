name: Selenium End-to-End Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install Google Chrome
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r selenium_tests/requirements.txt
        
    - name: Run Selenium Tests & Generate Reports
      working-directory: ./selenium_tests
      run: |
        # Create output directories for logs and screenshots
        mkdir -p Screenshots Logs
        
        # Run the wrapper script that triggers Pytest and builds the Excel Report
        python run_tests.py
        
    - name: Upload Execution Report Excel
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: Excel-Execution-Report
        path: selenium_tests/Execution_Report_*.xlsx
        
    - name: Upload Extent HTML Report
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: Extent-HTML-Report
        path: selenium_tests/ExtentReport.html
        
    - name: Upload Screenshots
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: Failure-Screenshots
        path: selenium_tests/Screenshots/
        
    - name: Upload Logs
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: Test-Logs
        path: selenium_tests/Logs/
