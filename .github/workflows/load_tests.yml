name: "🚀 CiviFix API — Baseline & Load Tests"

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.10"
  LOAD_MOCK: "true"

jobs:
  api-load-tests:
    name: "Run Baseline API Load Test (100 Users, 1 Min)"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: "📥 Checkout repository"
        uses: actions/checkout@v4

      - name: "🐍 Set up Python ${{ env.PYTHON_VERSION }}"
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: "📦 Install Load Test dependencies"
        run: |
          python -m pip install --upgrade pip
          pip install -r load_tests/requirements.txt
          echo "✅ Dependencies installed"

      - name: "⚡ Execute Load Test Suite"
        run: |
          python -m load_tests.run_load_test --users 100 --duration 60

      - name: "📊 Upload Load Test Excel Report"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CiviFix_LoadTest_Report
          path: CiviFix_LoadTest_Execution_Report.xlsx
          retention-days: 30
